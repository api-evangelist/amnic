naftiko: "1.0.0-alpha1"

info:
  label: "Amnic Cloud Cost Observability API"
  description: "API for programmatic access to cloud cost data from the Amnic platform, enabling automation of reporting and integration with other FinOps tools."
  tags:
    - Amnic
    - FinOps
    - Cloud Cost
    - Cost Observability
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      AMNIC_API_KEY: AMNIC_API_KEY

capability:
  consumes:
    - type: http
      namespace: amnic-api
      baseUri: https://api.amnic.com/orchestrator
      description: "Amnic Cloud Cost Observability API for retrieving saved chart data and filters."
      authentication:
        type: apikey
        key: X-API-Key
        value: "{{AMNIC_API_KEY}}"
        placement: header
      resources:
        - name: chart-filters
          path: /v1/external/view/{uuid}/filters
          description: "Retrieve filters configured in a saved Cost Analyzer chart."
          operations:
            - name: get-chart-filters
              method: GET
              description: "Returns the filters configured in a saved chart identified by its UUID."
              inputParameters:
                - name: uuid
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier of the saved chart."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: chart-data
          path: /v1/external/view/{uuid}
          description: "Retrieve saved chart cost data with optional custom filters."
          operations:
            - name: get-chart-data
              method: POST
              description: "Retrieves saved chart data by providing additional custom filters."
              inputParameters:
                - name: uuid
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier of the saved chart."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  filters: "{{tools.filters}}"

  exposes:
    - type: rest
      port: 8100
      namespace: amnic-rest
      resources:
        - path: /v1/charts/{uuid}/filters
          name: chart-filters
          description: "Get filters for a saved cost chart."
          operations:
            - method: GET
              name: get-chart-filters
              description: "Returns configured filters for a saved Cost Analyzer chart."
              call: "amnic-api.get-chart-filters"
              with:
                uuid: "rest.uuid"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/charts/{uuid}/data
          name: chart-data
          description: "Retrieve cost data from a saved chart with optional filters."
          operations:
            - method: POST
              name: get-chart-data
              description: "Retrieve saved chart cost data with custom filters applied."
              call: "amnic-api.get-chart-data"
              with:
                uuid: "rest.uuid"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: amnic-mcp
      transport: http
      tools:
        - name: get-chart-filters
          description: "Retrieve the filters configured in a saved Amnic Cost Analyzer chart by UUID."
          hints:
            readOnly: true
            openWorld: true
          call: "amnic-api.get-chart-filters"
          with:
            uuid: "tools.uuid"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-chart-data
          description: "Retrieve cost data from a saved Amnic chart with optional custom filters for FinOps analysis."
          hints:
            readOnly: true
            openWorld: true
          call: "amnic-api.get-chart-data"
          with:
            uuid: "tools.uuid"
          outputParameters:
            - type: object
              mapping: "$."
