  - type: Features
    data:
      - name: X-Ray Agent
        description: >-
          AI agent that provides cloud cost health assessments in 30 seconds, surfacing anomalies and optimization
          opportunities across AWS, GCP, Azure, and Kubernetes.
      - name: Insights Agent
        description: >-
          Delivers audience-specific cloud cost insights through natural language queries tailored for finance,
          engineering, and leadership teams.
      - name: Governance Agent
        description: >-
          Detects cost anomalies, manages budgets, and enforces tag hygiene across cloud environments for compliance and
          cost control.
      - name: Reporting Agent
        description: Generates customized cost reports for different stakeholder audiences with automated scheduling and delivery.
      - name: Cost Anomaly Detection
        description: >-
          Real-time detection of unexpected cost spikes and anomalies with alerts to reduce mean time to resolution by
          90%.
      - name: Cost Allocation
        description: Allocate cloud costs across teams, projects, and business units using tags and custom allocation rules.
      - name: Unit Economics
        description: Measure cost efficiency metrics and unit economics to understand cost per customer, feature, or business unit.
      - name: Budget Management
        description: Set budgets, track spending against targets, and receive alerts when budgets are approached or exceeded.
      - name: Spending Forecasting
        description: Predict future cloud costs based on historical usage patterns and growth trends.
      - name: Programmatic API Access
        description: >-
          REST API for automating reporting, retrieving saved chart data with custom filters, and integrating Amnic with
          other FinOps tools.
  - type: UseCases
    data:
      - name: Automated Cost Reporting
        description: >-
          Programmatically retrieve cloud cost data from saved charts and integrate into internal dashboards, data
          warehouses, or BI tools.
      - name: Cost Anomaly Investigation
        description: >-
          Detect and investigate unexpected cloud cost spikes using AI agents and real-time cost monitoring to reduce
          debugging time by 90%.
      - name: FinOps Workflow Automation
        description: >-
          Automate FinOps workflows including cost allocation, chargeback reporting, and budget variance analysis across
          engineering teams.
      - name: Multi-Cloud Cost Visibility
        description: >-
          Gain unified cost visibility across AWS, GCP, Azure, and Kubernetes environments in a single observability
          platform.
      - name: AI-Assisted Cost Optimization
        description: >-
          Use natural language queries and AI agents to identify cost optimization opportunities and implement
          recommendations.
      - name: Stakeholder Reporting
        description: >-
          Generate and deliver customized cost reports for finance, engineering, and executive stakeholders with
          relevant metrics and insights.
  - type: Integrations
    data:
      - name: AWS
        description: >-
          Connect AWS accounts to ingest billing and usage data for cost monitoring, anomaly detection, and optimization
          recommendations.
      - name: Google Cloud Platform
        description: Integrate GCP projects for unified cloud cost visibility and optimization across Google Cloud services.
      - name: Microsoft Azure
        description: Connect Azure subscriptions for real-time cost monitoring and FinOps automation across Azure services.
      - name: Kubernetes
        description: >-
          Native Kubernetes cost observability for container workloads, namespace cost allocation, and cluster
          efficiency optimization.
