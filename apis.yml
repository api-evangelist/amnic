apis:
  - aid: amnic:amnic-api
    name: Amnic Cloud Cost Observability API
    description: >-
      The Amnic API provides programmatic access to cloud cost data from saved Cost Analyzer charts, enabling automation
      of reporting and integration with other FinOps tools. Authenticate with an API key header to retrieve chart
      filters and cost data with custom filter parameters.
